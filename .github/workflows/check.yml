name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install --no-install-recommends
          libfontconfig-dev libwayland-dev libx11-xcb-dev libxcb1-dev
          libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
          libxkbcommon-dev libxkbcommon-x11-dev
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo check --lib --no-default-features
      - run: cargo test --lib
      - run: cargo test --examples
      - run: ruby scripts/check-wgpu-identity.rb
      - run: >-
          cargo test --manifest-path vendor/gpui-ce/Cargo.toml -p gpui
          embedded_application_has_explicit_update_and_reentrancy_boundaries --lib
      - run: >-
          cargo test --manifest-path vendor/gpui-ce/Cargo.toml -p gpui
          scene_snapshot_is_sendable_and_preserves_batch_order --lib
      - run: >-
          cargo test --manifest-path vendor/gpui-ce/Cargo.toml -p gpui_wgpu
          external_renderer_records_without_creating_or_presenting_a_surface --lib

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        run: >-
          sudo apt-get update && sudo apt-get install --no-install-recommends
          libfontconfig-dev libwayland-dev libx11-xcb-dev libxcb1-dev
          libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
          libxkbcommon-dev libxkbcommon-x11-dev
      - run: ruby scripts/check-docs.rb
      - run: cargo test --doc
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
